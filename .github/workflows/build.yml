name: Build AdaptixC2 Server

on:
  push:
    branches: [main, dev-*]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-server-ext:
    name: Build Server + Extenders (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mingw-w64 \
            g++-mingw-w64 \
            gcc \
            g++ \
            make \
            build-essential

      - name: Install go-win7 (for Gopher Agent Windows 7 support)
        run: |
          git clone https://github.com/Adaptix-Framework/go-win7 /tmp/go-win7
          sudo mv /tmp/go-win7 /usr/lib/
          sudo mkdir -p /usr/lib/go-win7/pkg/include
          cd /usr/lib/go-win7/src/runtime
          for f in *.h; do
            sudo ln -sf "/usr/lib/go-win7/src/runtime/$f" "/usr/lib/go-win7/pkg/include/$f"
          done

      - name: Build server
        run: make server

      - name: Build extenders
        run: make extenders

      - name: List build artifacts
        run: |
          echo "=== dist/ contents ==="
          find dist/ -type f | head -200

      - name: Upload server + extenders artifact
        uses: actions/upload-artifact@v4
        with:
          name: adaptixc2-server-linux-amd64
          path: dist/
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist
          tar -czf ../adaptixc2-server-linux-amd64.tar.gz .
          cd ..

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: adaptixc2-server-linux-amd64.tar.gz
          generate_release_notes: true
